name: Build APK desde PWA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile-crm/android/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1'

      - name: Crear keystore
        run: |
          keytool -genkey -v \
            -keystore mobile-crm/android/app/keystore.jks \
            -alias biomkt \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=Biomarketing, OU=Mobile, O=Biomarketing, L=BuenosAires, S=BuenosAires, C=AR"

      - name: Build APK
        working-directory: mobile-crm/android
        run: gradle assembleRelease
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: biomkt

      - name: Subir APK como artifact descargable
        uses: actions/upload-artifact@v4
        with:
          name: BIOMKT-CRM.apk
          path: mobile-crm/android/app/build/outputs/apk/release/app-release.apk

      - name: Obtener versión
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Crear Release con APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "BIOMKT CRM ${{ steps.version.outputs.tag }}"
          body: |
            APK de BIOMKT CRM Mobile.

            **Instalación:**
            1. Descargá el archivo `.apk`
            2. En Android: Ajustes → Seguridad → activar "Fuentes desconocidas"
            3. Abrí el APK descargado e instalá
          files: mobile-crm/android/app/build/outputs/apk/release/app-release.apk
          draft: false
